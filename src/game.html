<!doctype html>
<html lang="fr">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Skribbl WS - Rooms</title>
	<link rel="stylesheet" href="/styles.css" />
</head>

<body>
	<div class="container">
		<div id="errorBox" class="error"></div>

		<section id="wordChoice" class="hidden">
			<div class="panel">
				<div class="join-title">Choisis un mot à dessiner</div>
				<div class="actions">
					<button type="button"></button>
					<button type="button"></button>
					<button type="button"></button>
				</div>
			</div>
		</section>

		<section id="gameView" class="flex w-full h-[80vh] gap-4 mt-4 bg-gray-300 p-2">

			<div
				style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; padding: 0 10px;">
				<div id="gameTimer" style="font-weight: bold; color: #e74c3c; font-size: 1.1rem;">⏱️ 80s</div>
			</div>

			<div id="wordToDraw" class="word-to-draw">En attente…</div>

			<section class="flex flex-col w-1/4 gap-y-2">
				<ul id="playersList" class="players-list"></ul>

				<div id="chatComponent" class="w-full h-full border">
					<ul id="chatMessages" class="flex flex-col w-full h-9/10 overflow-y-auto"></ul>

					<form id="chatForm" class="flex w-full h-1/10 items-center p-2">
						<input type="text" id="guessInput" placeholder="Devinez le mot ici..." maxlength="50"
							autocomplete="off"  class="w-2/3 border"/>
						<button type="submit" id="sendGuess" class="w-1/3 border">Envoyer</button>
					</form>
				</div>

				<button id="leaveGameBtn" type="button">Quitter la partie</button>
			</section>

		</section>
	</div>

	<script type="module" src="./game-app.ts"></script>
</body>

</html>
