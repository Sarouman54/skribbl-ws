<!doctype html>
<html lang="fr">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Skribbl WS - Rooms</title>
	<link rel="stylesheet" href="/styles.css" />
</head>

<body>
	<div class="container">
		<div id="errorBox" class="error"></div>

		<section id="wordChoice" class="screen hidden">
			<div class="panel">
				<div class="join-title">Choisis un mot à dessiner</div>
				<div class="actions">
					<button type="button"></button>
					<button type="button"></button>
					<button type="button"></button>
				</div>
			</div>
		</section>

		<section id="gameView" class="screen">

			<div id="chatComponent" class="chat-container">
				<div class="chat-header">Chat</div>

				<ul id="chatMessages" class="chat-messages"></ul>

				<form id="chatForm" class="chat-input-area">
					<input type="text" id="guessInput" placeholder="Devinez le mot ici..." maxlength="50"
						autocomplete="off" />
					<button type="submit" id="sendGuess">Envoyer</button>
				</form>
			</div>

			<div id="sidebar">
				<div class="panel" style="min-height: auto; margin-bottom: 10px;">
					<div class="welcome" style="margin-bottom: 8px;">Joueurs</div>
					<ul id="playersList" class="players-list"></ul>
				</div>

				<!-- Mock Controls -->
				<div class="panel" style="min-height: auto; background: #fffdf5;">
					<div class="welcome" style="margin-bottom: 8px; color: #d35400;">🔧 Simulation Score</div>
					
					<div style="margin-bottom: 10px; font-size: 0.9rem; background: #fdf6ec; padding: 6px; border-radius: 4px; border: 1px solid #f5e7d3;">
						<div>🎨 Dessinateur: <span id="mockDrawer" style="font-weight: bold; color: #e67e22;">-</span></div>
						<div>⏱️ Temps restant: <span id="mockTimer" style="font-weight: bold; color: #e74c3c;">80</span>s</div>
					</div>

					<div class="actions" style="gap: 5px;">
						<input type="text" id="mockWord" placeholder="Mot secret (ex: Lapin)" style="margin-bottom: 5px;">
						<button id="btnStartRound" type="button" style="background: #e67e22; color: white; border: none;">▶️ Démarrer Manche</button>
						<button id="btnEndRound" type="button" style="background: #e74c3c; color: white; border: none;">⏹️ Terminer Manche</button>
					</div>
				</div>
			</div>

			<button id="leaveGameBtn" type="button" style="margin-top: 10px;">Quitter la partie</button>
		</section>
	</div>
	<script type="module" src="./game-app.ts"></script>
</body>

</html>
